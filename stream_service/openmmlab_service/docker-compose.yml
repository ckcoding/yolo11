services:
  openmmlab-server:
    build: .
    container_name: openmmlab_stream_service
    restart: always
    init: true
    network_mode: host
    working_dir: /workspace/openmmlab_service
    command: ["python", "-m", "openmmlab_service.main"]
    volumes:
      - .:/workspace/openmmlab_service
      # OpenMMLab 配置和权重统一挂到 /workspace/models
      - ../models:/workspace/models:ro
      - ../fonts:/workspace/fonts:ro
      - ../:/workspace/media:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/workspace
      # OpenMMLab 模型定义与基础参数，全权交由同目录下的 config.yml 管理
    ulimits:
      core: 0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute, utility]

